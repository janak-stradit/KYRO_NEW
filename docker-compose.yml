# ============================================================
# KYRO AML Pipeline — Docker Compose
# Services: PostgreSQL 16, pgAdmin 4, Pipeline (ETL runner),
#           Redis, Risk Assessment API, Celery worker/beat
# ============================================================

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kyro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kyro_aml}
      POSTGRES_USER: ${DB_USER:-kyro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kyro_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run DDL scripts on first start
      - ./pipeline/migrations/001_create_schemas_tables.sql:/docker-entrypoint-initdb.d/01_tables.sql
      - ./pipeline/migrations/002_create_indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql
      - ./pipeline/migrations/003_triggers_procedures_views.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./pipeline/migrations/004_security_roles.sql:/docker-entrypoint-initdb.d/04_security.sql
      # Custom postgresql.conf tuning
      - ./docker/postgresql.conf:/etc/postgresql/postgresql.conf
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c log_statement=ddl
        -c log_min_duration_statement=500
        -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-kyro_user} -d ${DB_NAME:-kyro_aml}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyro_net

  # ── pgAdmin 4 (Database UI) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kyro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kyro.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kyro_net
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── Pipeline runner (ETL) ──────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: kyro_pipeline
    restart: "no"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-kyro_aml}
      DB_USER: ${DB_USER:-kyro_user}
      DB_PASSWORD: ${DB_PASSWORD:-kyro_pass}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      PIPELINE_ENV: ${PIPELINE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NUM_CUSTOMERS: ${NUM_CUSTOMERS:-10000}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipeline:/app/pipeline
      - ./output:/app/output
      - ./logs:/app/logs
      - ./artifacts:/app/artifacts
    command: python -m pipeline.run_pipeline
    networks:
      - kyro_net

  # ── Redis (Celery broker/result backend) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: kyro_redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyro_net

  # ── Risk Assessment API (FastAPI) ──────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: kyro_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-kyro_user}:${DB_PASSWORD:-kyro_pass}@postgres:5432/${DB_NAME:-kyro_aml}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      APP_NAME: ${APP_NAME:-KYRO Risk Assessment}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_REGISTRY_PATH: /app/models
      # TTS Configuration
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_turbo_v2}
      TTS_PROVIDER: ${TTS_PROVIDER:-elevenlabs}
    ports:
      - "${API_HOST_PORT:-8010}:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyro_net

  # ── Risk Assessment Frontend (Nginx) ───────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: kyro_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    volumes:
      - ./frontend/phase3:/usr/share/nginx/html
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kyro_net

  # ── Celery worker (async rules-engine backstop + ML training) ──
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: kyro_celery_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-kyro_user}:${DB_PASSWORD:-kyro_pass}@postgres:5432/${DB_NAME:-kyro_aml}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MODEL_REGISTRY_PATH: /app/models
    volumes:
      - ./models:/app/models
    command: celery -A app.tasks.celery_app worker --loglevel=info
    # Overrides the API image's HTTP healthcheck (there's no uvicorn here).
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyro_net

  # ── Celery beat (schedules the daily ETL/rescoring job) ────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: kyro_celery_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-kyro_user}:${DB_PASSWORD:-kyro_pass}@postgres:5432/${DB_NAME:-kyro_aml}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MODEL_REGISTRY_PATH: /app/models
    volumes:
      - ./models:/app/models
    command: celery -A app.tasks.celery_app beat --loglevel=info
    # beat doesn't answer broker pings like a worker does, and the API
    # image's inherited HTTP healthcheck doesn't apply here either.
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyro_net

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

networks:
  kyro_net:
    driver: bridge
