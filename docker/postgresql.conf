# ============================================================
# PostgreSQL 16 Performance Tuning Configuration
# Optimised for KYRO AML pipeline workloads
# ============================================================

# ── Memory ────────────────────────────────────────────────────
shared_buffers            = 256MB      # 25% of total RAM (adjust for prod)
effective_cache_size      = 768MB      # 75% of total RAM
work_mem                  = 16MB       # Per sort/hash operation
maintenance_work_mem      = 64MB       # For VACUUM, CREATE INDEX
wal_buffers               = 16MB

# ── Connections ───────────────────────────────────────────────
max_connections           = 100
# Use PgBouncer in production for connection pooling beyond 100

# ── Checkpoints ───────────────────────────────────────────────
checkpoint_completion_target = 0.9
checkpoint_timeout        = 10min
max_wal_size              = 1GB
min_wal_size              = 80MB

# ── Query Planner ─────────────────────────────────────────────
default_statistics_target = 100
random_page_cost          = 1.1       # SSD: use 1.1; HDD: 4.0
effective_io_concurrency  = 200       # SSD; set 2 for HDD

# ── Parallelism ───────────────────────────────────────────────
max_worker_processes      = 8
max_parallel_workers      = 4
max_parallel_workers_per_gather = 2

# ── Logging ───────────────────────────────────────────────────
logging_collector         = on
log_directory             = 'pg_log'
log_filename              = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age          = 1d
log_rotation_size         = 100MB
log_min_duration_statement = 500     # Log queries taking >500ms
log_checkpoints           = on
log_connections           = on
log_disconnections        = on
log_lock_waits            = on
log_temp_files            = 0
log_autovacuum_min_duration = 250ms

# ── Autovacuum tuning ─────────────────────────────────────────
autovacuum                = on
autovacuum_vacuum_scale_factor   = 0.05
autovacuum_analyze_scale_factor  = 0.02
autovacuum_vacuum_cost_delay     = 2ms
autovacuum_max_workers           = 4

# ── SSL ───────────────────────────────────────────────────────
ssl                       = off      # Set to 'on' in production with proper certs

# ── Extensions ────────────────────────────────────────────────
shared_preload_libraries  = 'pg_stat_statements'
pg_stat_statements.track  = all
listen_addresses = '*'
