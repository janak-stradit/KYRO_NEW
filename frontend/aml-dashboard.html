<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML Dashboard</title>
<style>
  :root {
    --orange: #f97a3c;
    --dark: #2b3444;
    --text: #1c2430;
    --muted: #9aa3b2;
    --grid: #e8eaef;
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #eceef2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Top bar ─────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    padding: 12px 40px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  /* two-tone butterfly-ish logo mark */
  .logo {
    width: 34px;
    height: 28px;
    position: relative;
  }
  .logo::before,
  .logo::after {
    content: "";
    position: absolute;
    top: 0;
    width: 16px;
    height: 28px;
    border-radius: 45% 45% 50% 50%;
  }
  .logo::before {
    left: 0;
    background: var(--dark);
    transform: rotate(-12deg);
  }
  .logo::after {
    right: 0;
    background: var(--orange);
    transform: rotate(12deg);
  }

  .search {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 250px;
    padding: 9px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 14px;
  }
  .search input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-size: 14px;
    color: var(--text);
  }
  .search svg { flex-shrink: 0; }

  /* ── Nav tabs ────────────────────────────── */
  .tabs {
    display: flex;
    gap: 36px;
    background: var(--card);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
  }
  .tab {
    padding: 16px 4px;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    border-bottom: 2px solid transparent;
  }
  .tab.active {
    color: var(--orange);
    border-bottom-color: var(--orange);
  }
  .tab:hover { color: var(--orange); }

  /* ── Cards layout ────────────────────────── */
  .page {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px;
    padding: 32px 40px;
    max-width: 1400px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    box-shadow: 0 1px 2px rgba(20, 28, 40, 0.04);
  }

  .card h2 {
    font-size: 19px;
    font-weight: 700;
  }
  .card .subtitle {
    font-size: 13.5px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* legend chip (shared) */
  .legend {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--text);
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.orange { background: var(--orange); }
  .dot.dark   { background: var(--dark); }

  /* ── Bar chart ───────────────────────────── */
  .chart-legend { margin: 22px 0 18px; }

  .chart {
    position: relative;
    height: 220px;
    margin-left: 38px;   /* room for y-axis labels */
  }

  .gridline {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed var(--grid);
  }
  .gridline span {
    position: absolute;
    left: -38px;
    top: -7px;
    font-size: 11.5px;
    color: var(--muted);
  }
  /* 0..100 → five lines every 25% */
  .gridline:nth-child(1) { top: 0%;   }
  .gridline:nth-child(2) { top: 25%;  }
  .gridline:nth-child(3) { top: 50%;  }
  .gridline:nth-child(4) { top: 75%;  }
  .gridline:nth-child(5) { top: 100%; }

  .bars {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }

  .bar-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;          /* visual gap between the stacked pills */
    height: 100%;
    justify-content: flex-end;
  }

  .bar {
    width: 26px;
    border-radius: 13px;
  }
  .bar.dark   { background: var(--dark);   height: 30%; }
  .bar.orange { background: var(--orange); height: 40%; }

  .x-label {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Donut chart ─────────────────────────── */
  .donut-card {
    display: flex;
    flex-direction: column;
  }

  .donut-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 0;
  }

  .donut {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: conic-gradient(
      var(--dark) 0turn 0.1turn,     /* Low/Mid 10% */
      var(--orange) 0.1turn 1turn    /* High Risk 90% */
    );
    /* punch the hole */
    -webkit-mask: radial-gradient(circle, transparent 62px, #000 63px);
            mask: radial-gradient(circle, transparent 62px, #000 63px);
  }

  .donut-legend {
    display: flex;
    justify-content: center;
    gap: 22px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  /* ── Responsive ──────────────────────────── */
  @media (max-width: 900px) {
    .page { grid-template-columns: 1fr; padding: 20px; }
    .topbar, .tabs { padding-left: 20px; padding-right: 20px; }
    .tabs { overflow-x: auto; gap: 24px; }
    .search { width: 170px; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="logo"></span>
      AML
    </div>
    <label class="search">
      <input type="text" placeholder="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
    </label>
  </header>

  <nav class="tabs">
    <a class="tab active" href="#">Dashboard</a>
    <a class="tab" href="#">Periodic Reviews</a>
    <a class="tab" href="#">Review Cases</a>
    <a class="tab" href="#">Patterns</a>
    <a class="tab" href="#">Kyro Chat</a>
  </nav>

  <main class="page">

    <!-- Review Case Volume -->
    <section class="card">
      <h2>Review Case Volume</h2>
      <p class="subtitle">Overview of Reviews</p>

      <div class="legend chart-legend">
        <span class="dot orange"></span> +913 Last period
      </div>

      <div class="chart">
        <div class="gridline"><span>100</span></div>
        <div class="gridline"><span>75</span></div>
        <div class="gridline"><span>50</span></div>
        <div class="gridline"><span>25</span></div>
        <div class="gridline"><span>0</span></div>

        <div class="bars">
          <div class="bar-group">
            <div class="bar dark"></div>
            <div class="bar orange"></div>
            <span class="x-label">Fri</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Customer Risk Profile -->
    <section class="card donut-card">
      <h2>Customer Risk Profile</h2>
      <p class="subtitle">Overview of Customer Risk</p>

      <div class="donut-wrap">
        <div class="donut" role="img" aria-label="High risk 90 percent, low or mid risk 10 percent"></div>
      </div>

      <div class="donut-legend">
        <span class="legend"><span class="dot orange"></span> High Risk - (90.0%)</span>
        <span class="legend"><span class="dot dark"></span> Low/Mid - (10.0%)</span>
      </div>
    </section>

  </main>

</body>
</html>
