    <!-- Active Nav Link Handler -->
    <script>
        $(document).ready(function() {
            // Handle nav link clicks
            $('.nav-link[data-page]').on('click', function(e) {
                // Remove active class from all nav links
                $('.nav-link[data-page]').removeClass('active').css({
                    'color': '#6b7280',
                    'border-bottom': '2px solid transparent'
                });
                
                // Add active class to clicked link
                $(this).addClass('active').css({
                    'color': '#f97316',
                    'border-bottom': '2px solid #f97316'
                });
            });
            
            // Set active based on current page on load
            const currentPath = window.location.pathname;
            $('.nav-link[data-page]').each(function() {
                const href = $(this).attr('href');
                if (currentPath.includes(href) || (currentPath === '/' && href === '/dashboard')) {
                    $(this).addClass('active').css({
                        'color': '#f97316',
                        'border-bottom': '2px solid #f97316'
                    });
                }
            });
        });
    </script>
