<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>KYRO - Login</title>
    <meta name="description" content="KYRO Risk Assessment Specialist - Secure Login">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom KYRO Theme -->
    <link rel="stylesheet" href="css/custom.css">
    
    <style>
        body {
            background: linear-gradient(135deg, var(--kyro-primary) 0%, var(--kyro-secondary) 100%);
            min-height: 100vh;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, var(--kyro-primary), var(--kyro-secondary));
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .login-body {
            padding: 2.5rem 2rem 2rem;
        }
        .brand-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }
        .brand-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .brand-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 500;
        }
        .form-floating {
            margin-bottom: 1.5rem;
        }
        .form-floating .form-control {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 1rem 0.75rem;
            height: auto;
        }
        .form-floating .form-control:focus {
            border-color: var(--kyro-primary);
            box-shadow: 0 0 0 0.2rem rgba(26, 35, 126, 0.25);
        }
        .form-floating label {
            padding: 1rem 0.75rem;
            color: #6c757d;
        }
        .btn-login {
            border-radius: 12px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--kyro-primary), var(--kyro-secondary));
            border: none;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 35, 126, 0.3);
        }
        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #6c757d;
            transition: color 0.2s ease;
        }
        .password-toggle:hover {
            color: var(--kyro-primary);
        }
        .form-check-input:checked {
            background-color: var(--kyro-primary);
            border-color: var(--kyro-primary);
        }
        .demo-info {
            background: rgba(3, 155, 229, 0.1);
            border: 1px solid rgba(3, 155, 229, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .demo-credentials {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.85rem;
        }
        .loading-state .btn-login {
            background: #6c757d;
        }
        .security-notice {
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 8px;
        }
        .floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
        }
        
        /* Dark Mode Overrides */
        [data-theme="dark"] body {
            background-color: #0b0e14;
            color: #f1f5f9;
        }
        [data-theme="dark"] .login-card {
            background: #131722;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        [data-theme="dark"] .form-floating .form-control {
            background-color: #1a202c;
            border-color: #2d3748;
            color: #f1f5f9;
        }
        [data-theme="dark"] .form-floating label {
            color: #a0aec0;
        }
        [data-theme="dark"] .demo-info {
            background: rgba(3, 155, 229, 0.15);
            border-color: rgba(3, 155, 229, 0.4);
            color: #e2e8f0;
        }
        [data-theme="dark"] .security-notice {
            background: rgba(255, 255, 255, 0.02);
            color: #a0aec0;
        }
    </style>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>

    <!-- Floating particles background -->
    <div class="floating-particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 8s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 10s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 14s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 16s;"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-logo">🛡️</div>
                <h1 class="brand-title">KYRO</h1>
                <p class="brand-subtitle">Risk Assessment Specialist</p>
            </div>
            
            <div class="login-body">
                <!-- Demo Credentials Info -->
                <div class="demo-info">
                    <div class="d-flex align-items-center mb-2">
                        <i class="fas fa-info-circle text-info me-2"></i>
                        <strong class="text-info">Demo Credentials</strong>
                    </div>
                    <div class="demo-credentials">
                        <div><strong>Username:</strong> analyst</div>
                        <div><strong>Password:</strong> kyro123</div>
                    </div>
                </div>
                
                <form id="loginForm">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="username" placeholder="Username" required autocomplete="username">
                        <label for="username">
                            <i class="fas fa-user me-2"></i>Username
                        </label>
                    </div>
                    
                    <div class="form-floating position-relative">
                        <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
                        <label for="password">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <span class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me for 30 days
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In Securely
                    </button>
                </form>
                
                <div class="security-notice">
                    <small class="text-muted d-flex align-items-center justify-content-center">
                        <i class="fas fa-shield-alt me-2 text-success"></i>
                        256-bit SSL encryption • SOC 2 compliant
                    </small>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay d-none" id="loadingOverlay">
        <div class="text-center">
            <div class="spinner-border text-light mb-3" style="width: 3rem; height: 3rem;"></div>
            <div class="text-light fs-5">Authenticating...</div>
            <div class="text-light opacity-75">Verifying credentials and permissions</div>
        </div>
    </div>
    
    <!-- jQuery 3.7 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- KYRO Application Scripts -->
    <script src="js/utils.js?v=9999"></script>
    <script src="js/auth.js?v=9999999999"></script>
    
    <script>
        $(document).ready(function() {
            // Pre-fill demo credentials
            $("#username").val("analyst");
            $("#password").val("kyro123");
            
            // Initialize login form
            LoginForm.init();
            
            // Add some interactive effects
            $(".form-control").on("focus", function() {
                $(this).closest(".form-floating").addClass("focused");
            }).on("blur", function() {
                $(this).closest(".form-floating").removeClass("focused");
            });
            
            // Handle demo credential clicks
            $(".demo-credentials").on("click", function() {
                $("#username").val("analyst").focus();
                $("#password").val("kyro123");
                showToast("info", "Demo credentials filled", "Ready to login");
            });
        });
    </script>
</body>
</html>
