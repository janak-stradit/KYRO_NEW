[pytest]
testpaths =
    pipeline/tests
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=pipeline
    --cov-report=term-missing
    --cov-report=html:htmlcov
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require generator)
    db: Tests requiring live PostgreSQL connection
log_cli = true
log_cli_level = WARNING
